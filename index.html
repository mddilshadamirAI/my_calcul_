<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="my_logo.png">
    <link rel="apple-touch-icon" href="my_logo.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dilshad's Calc Pro</title>
    <style>
        /* Exact Deep Background from Screenshot */
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            background: #0d1527;
            overflow: hidden;
        }

        /* Clean Glassmorphic Container */
        .calc-card { 
            background: rgba(21, 32, 54, 0.6); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 24px; 
            border-radius: 28px; 
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4); 
            text-align: center; 
            width: 340px; 
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .header-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            padding: 0 4px;
            gap: 8px;
        }

        .logo { 
            width: 44px; 
            height: 44px; 
            border-radius: 50%; 
        }

        h2 { 
            margin: 0; 
            color: #ffffff; 
            font-size: 18px; 
            font-weight: 600;
            text-align: left;
            flex-grow: 1;
        }

        /* 🔥 NEW: PREMIUM REVISE AUDIO INTERFACE BUTTON */
        .btn-revise {
            background: rgba(56, 189, 248, 0.12);
            border: 1px solid rgba(56, 189, 248, 0.3);
            color: #38bdf8;
            padding: 6px 14px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .btn-revise:hover {
            background: #38bdf8;
            color: #0d1527;
            box-shadow: 0 0 12px rgba(56, 189, 248, 0.4);
        }
        
        .btn-revise:active {
            transform: scale(0.95);
        }

        /* Display Panel matching the Screenshot */
        .display-container {
            background: rgba(9, 15, 29, 0.7);
            border-radius: 18px;
            padding: 20px;
            margin-bottom: 24px;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
        }

        #display { 
            width: 100%; 
            font-size: 38px; 
            text-align: right; 
            background: transparent;
            color: #38bdf8;
            border: none;
            outline: none;
            font-family: 'Segoe UI', sans-serif;
            transition: transform 0.2s ease, opacity 0.2s ease;
        }

        .animate-pop {
            animation: answerPop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.2) forwards;
        }

        @keyframes answerPop {
            0% { transform: scale(0.95); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* 4-Column Grid for All Rows */
        .buttons { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 12px; 
        }

        /* Button Styling matching the Screenshot Layout */
        button { 
            padding: 16px 0;
            font-size: 22px; 
            font-weight: 600;
            border: none; 
            border-radius: 16px; 
            cursor: pointer; 
            background: #2b3344; 
            color: #ffffff;
            transition: all 0.15s ease; 
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Glowing Effects on Tap */
        button:active { 
            transform: scale(0.92);
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
        }

        /* Specific Button Colors from your Screenshot */
        .btn-action {
            background: #2e3648;
            color: #ffffff;
        }

        .operator { 
            background: #2563eb; 
            color: #ffffff;
        }

        .equal { 
            background: #16a34a; 
            color: #ffffff;
        }
        .equal:active {
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.5);
        }

        /* Hidden Vault Styles */
        .vault-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(9, 15, 29, 0.95);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            z-index: 999;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .vault-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .vault-content {
            background: #152036;
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 24px;
            border-radius: 24px;
            width: 85%;
            max-width: 400px;
            color: white;
        }

        .vault-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .close-vault-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 8px 16px;
            font-size: 14px;
            border-radius: 10px;
            cursor: pointer;
        }

        .file-upload-label {
            display: block;
            background: rgba(37, 99, 235, 0.2);
            color: #3b82f6;
            border: 2px dashed #2563eb;
            padding: 20px;
            border-radius: 14px;
            cursor: pointer;
            text-align: center;
            font-weight: 600;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 20px;
            max-height: 200px;
            overflow-y: auto;
        }

        .gallery-item {
            position: relative;
            aspect-ratio: 1;
            border-radius: 8px;
            overflow: hidden;
        }

        .gallery-item img, .gallery-item video {
            width: 100%; height: 100%; object-fit: cover;
        }

        .delete-item-btn {
            position: absolute;
            top: 2px; right: 2px;
            background: #ef4444;
            border: none; color: white;
            border-radius: 50%; width: 20px; height: 20px;
            font-size: 12px; cursor: pointer;
        }
    </style>
</head>
<body>

<div class="calc-card">
    <div class="header-section">
        <h2 id="calc-title">Dilshad's Calc Pro</h2>
        <button class="btn-revise" onclick="reviseCalculation()">🔊 Revise</button>
        <img src="my_logo.png" alt="Logo" class="logo">
    </div>
    
    <div class="display-container">
        <input type="text" id="display" readonly placeholder="0">
    </div>

    <div class="buttons">
        <button class="btn-action" onclick="clearDisplay()">C</button>
        <button class="btn-action" onclick="deleteLast()">DEL</button>
        <button class="btn-action" onclick="appendOperator('%')">%</button>
        <button class="operator" onclick="appendOperator('/')">÷</button>
        
        <button onclick="appendNumber('7')">7</button>
        <button onclick="appendNumber('8')">8</button>
        <button onclick="appendNumber('9')">9</button>
        <button class="operator" onclick="appendOperator('*')">×</button>
        
        <button onclick="appendNumber('4')">4</button>
        <button onclick="appendNumber('5')">5</button>
        <button onclick="appendNumber('6')">6</button>
        <button class="operator" onclick="appendOperator('-')">-</button>
        
        <button onclick="appendNumber('1')">1</button>
        <button onclick="appendNumber('2')">2</button>
        <button onclick="appendNumber('3')">3</button>
        <button class="operator" onclick="appendOperator('+')">+</button>
        
        <button onclick="appendNumber('0')">0</button>
        <button onclick="appendNumber('.')">.</button>
        <button class="equal" onclick="calculate()" style="grid-column: span 2;">=</button>
    </div>
</div>

<div id="vaultOverlay" class="vault-overlay">
    <div class="vault-content">
        <div class="vault-header">
            <h3>🔒 Private Vault</h3>
            <button class="close-vault-btn" onclick="closeVault()">Lock</button>
        </div>
        <label class="file-upload-label">
            📁 Upload to Hide Media
            <input type="file" id="vaultInput" accept="image/*,video/*" multiple style="display: none;" onchange="handleFileSelect(event)">
        </label>
        <div id="galleryGrid" class="gallery-grid"></div>
    </div>
</div>

<script>
    let display = document.getElementById('display');
    let calcTitle = document.getElementById('calc-title');
    let clearOnNextInput = false;

    // AUDIO STRUCT MATRIX
    let lastActiveFormula = ""; 
    let finalCalculationResult = "";

    let vaultCode = localStorage.getItem('vaultCode') || null;
    let equalClickCount = 0;

    if (!vaultCode) {
        calcTitle.innerText = "Set Passcode & Press =";
    }

    function appendNumber(value) {
        display.classList.remove('animate-pop');
        if (clearOnNextInput) {
            display.value = '';
            clearOnNextInput = false;
        }
        if (value === '.') {
            const parts = display.value.split(/[\+\-\*\/%]/);
            const currentPart = parts[parts.length - 1];
            if (currentPart.includes('.')) return;
        }
        display.value += value;
        equalClickCount = 0;
    }

    function appendOperator(op) {
        display.classList.remove('animate-pop');
        if (clearOnNextInput) clearOnNextInput = false;
        if (display.value === '') {
            if (op === '-') display.value += op;
            return;
        }
        let lastChar = display.value.slice(-1);
        if (['+', '-', '*', '/', '%'].includes(lastChar)) {
            display.value = display.value.slice(0, -1) + op;
        } else {
            display.value += op;
        }
        equalClickCount = 0;
    }

    function clearDisplay() {
        display.classList.remove('animate-pop');
        display.value = '';
        lastActiveFormula = "";
        finalCalculationResult = "";
        equalClickCount = 0;
    }

    function deleteLast() {
        display.classList.remove('animate-pop');
        display.value = display.value.slice(0, -1);
        equalClickCount = 0;
    }

    function calculate() {
        if (display.value === '') return;
        
        let currentInput = display.value;
        let lastChar = currentInput.slice(-1);
        if (['+', '-', '*', '/', '%'].includes(lastChar)) {
            currentInput = currentInput.slice(0, -1);
        }

        if (!vaultCode && !isNaN(currentInput)) {
            vaultCode = currentInput;
            localStorage.setItem('vaultCode', vaultCode);
            display.value = "Code Set!";
            clearOnNextInput = true;
            calcTitle.innerText = "Dilshad's Calc Pro";
            return;
        }

        if (vaultCode && currentInput === vaultCode) {
            equalClickCount++;
            if (equalClickCount === 2) {
                openVault();
                clearDisplay();
                return;
            }
        } else {
            equalClickCount = 1;
        }

        try {
            // Store current math sequence context prior to structural alteration
            lastActiveFormula = currentInput;
            
            let result = eval(currentInput);
            if (result % 1 !== 0) {
                result = parseFloat(result.toFixed(8));
            }
            
            finalCalculationResult = result;
            display.value = result;
            clearOnNextInput = true;

            display.classList.remove('animate-pop');
            void display.offsetWidth; 
            display.classList.add('animate-pop');
        } catch (error) {
            display.value = "Error";
            lastActiveFormula = "";
            finalCalculationResult = "";
            clearOnNextInput = true;
            display.classList.add('animate-pop');
        }
    }

    // 🔥 NEW: TEXT TO SPEECH REVISE ENGINE MODULE
    function reviseCalculation() {
        // Halt existing speech patterns before initiating new audio track
        window.speechSynthesis.cancel();

        let contextToSpeak = "";

        // Determine if calculation array has run or if screen contains incomplete chain
        if (lastActiveFormula !== "") {
            contextToSpeak = lastActiveFormula + " equals " + finalCalculationResult;
        } else if (display.value !== "" && display.value !== "Error" && display.value !== "Code Set!") {
            contextToSpeak = display.value;
        } else {
            contextToSpeak = "Zero";
        }

        // Clean mapping conversion for seamless phonetic articulation
        let audioString = contextToSpeak
            .replaceAll('+', ' plus ')
            .replaceAll('-', ' minus ')
            .replaceAll('*', ' multiplied by ')
            .replaceAll('/', ' divided by ')
            .replaceAll('%', ' percent ')
            .replaceAll('.', ' point ');

        // Audio instantiation assembly loop
        let voiceUtterance = new SpeechSynthesisUtterance(audioString);
        
        // Custom configuration calibration metrics
        voiceUtterance.rate = 0.95; // Natural clear cadence pace
        voiceUtterance.pitch = 1.0; // Clear tone presentation
        
        window.speechSynthesis.speak(voiceUtterance);
    }

    function openVault() {
        document.getElementById('vaultOverlay').classList.add('active');
        renderGallery();
    }

    function closeVault() {
        document.getElementById('vaultOverlay').classList.remove('active');
        equalClickCount = 0;
    }

    function handleFileSelect(event) {
        const files = event.target.files;
        let vaultItems = JSON.parse(localStorage.getItem('vaultItems')) || [];

        for (let file of files) {
            const reader = new FileReader();
            reader.onload = function(e) {
                vaultItems.push({
                    type: file.type.startsWith('video') ? 'video' : 'image',
                    data: e.target.result
                });
                localStorage.setItem('vaultItems', JSON.stringify(vaultItems));
                renderGallery();
            };
            reader.readAsDataURL(file);
        }
    }

    function renderGallery() {
        const grid = document.getElementById('galleryGrid');
        grid.innerHTML = '';
        let vaultItems = JSON.parse(localStorage.getItem('vaultItems')) || [];

        vaultItems.forEach((item, index) => {
            const container = document.createElement('div');
            container.className = 'gallery-item';

            if (item.type === 'video') {
                const video = document.createElement('video');
                video.src = item.data;
                video.controls = true;
                container.appendChild(video);
            } else {
                const img = document.createElement('img');
                img.src = item.data;
                container.appendChild(img);
            }

            const deleteBtn = document.createElement('button');
            deleteBtn.className = 'delete-item-btn';
            deleteBtn.innerHTML = '×';
            deleteBtn.onclick = () => {
                vaultItems.splice(index, 1);
                localStorage.setItem('vaultItems', JSON.stringify(vaultItems));
                renderGallery();
            };
            container.appendChild(deleteBtn);
            grid.appendChild(container);
        });
    }
</script>
</body>
</html>
