<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="my_logo.png">
    <link rel="apple-touch-icon" href="my_logo.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dilshad's Calc Pro Vault</title>
    <style>
        /* Deep Premium Gradient Background */
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            background: radial-gradient(circle at top left, #1e1b4b, #0f172a, #020617);
            overflow: hidden;
        }

        /* Glassmorphism Container Card */
        .calc-card { 
            background: rgba(30, 41, 59, 0.45); 
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 24px; 
            border-radius: 24px; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); 
            text-align: center; 
            width: 320px; 
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
        }

        .header-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding: 0 5px;
        }

        .logo { 
            width: 45px; 
            height: 45px; 
            border-radius: 50%; 
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        h2 { 
            margin: 0; 
            color: rgba(255, 255, 255, 0.9); 
            font-size: 18px; 
            font-weight: 600;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        /* Glassmorphism Input Window */
        .display-container {
            background: rgba(15, 23, 42, 0.6);
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        #display { 
            width: 100%; 
            height: 50px; 
            font-size: 32px; 
            text-align: right; 
            background: transparent;
            color: #38bdf8;
            border: none;
            outline: none;
            font-family: monospace;
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.3);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease;
        }

        .animate-pop {
            animation: answerPop 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes answerPop {
            0% { transform: translateY(10px) scale(0.9); opacity: 0; }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }

        /* Exact Layout Grid */
        .buttons { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 12px; 
        }

        button { 
            padding: 18px; 
            font-size: 20px; 
            font-weight: bold;
            border: 1px solid rgba(255, 255, 255, 0.08); 
            border-radius: 14px; 
            cursor: pointer; 
            background: rgba(255, 255, 255, 0.03); 
            color: #f8fafc;
            transition: all 0.15s ease; 
            outline: none;
            position: relative;
            -webkit-tap-highlight-color: transparent;
        }

        button:active { 
            transform: scale(0.92);
            background: rgba(56, 189, 248, 0.25) !important;
            color: #ffffff !important;
            border-color: #38bdf8 !important;
            box-shadow: 0 0 25px #0284c7, 0 0 10px #38bdf8 !important;
            text-shadow: 0 0 8px #fff;
        }

        .btn-action {
            background: rgba(148, 163, 184, 0.1);
            color: #cbd5e1;
        }
        .btn-action:active {
            background: rgba(148, 163, 184, 0.3) !important;
            box-shadow: 0 0 25px rgba(148, 163, 184, 0.8), 0 0 10px #cbd5e1 !important;
            border-color: #cbd5e1 !important;
        }

        .operator { 
            background: rgba(2, 132, 199, 0.15); 
            color: #38bdf8; 
            border-color: rgba(2, 132, 199, 0.3);
        }

        .equal { 
            background: rgba(22, 163, 74, 0.2); 
            color: #4ade80;
            border-color: rgba(22, 163, 74, 0.3);
        }
        .equal:active { 
            background: rgba(34, 197, 94, 0.4) !important; 
            box-shadow: 0 0 25px #16a34a, 0 0 10px #4ade80 !important;
            border-color: #4ade80 !important;
        }

        /* --- HIDDEN VAULT SCREEN (GLASSMORPHISM OVERLAY) --- */
        .vault-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            z-index: 999;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .vault-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .vault-content {
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 24px;
            width: 85%;
            max-width: 450px;
            max-height: 80vh;
            overflow-y: auto;
            color: white;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .vault-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 10px;
        }

        .close-vault-btn {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.4);
            padding: 8px 16px;
            font-size: 14px;
            border-radius: 10px;
        }

        .file-upload-label {
            display: block;
            background: rgba(56, 189, 248, 0.15);
            color: #38bdf8;
            border: 2px dashed rgba(56, 189, 248, 0.4);
            padding: 20px;
            border-radius: 14px;
            cursor: pointer;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 20px;
        }

        .gallery-item {
            position: relative;
            aspect-ratio: 1;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .gallery-item img, .gallery-item video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .delete-item-btn {
            position: absolute;
            top: 4px; right: 4px;
            background: rgba(239, 68, 68, 0.8);
            border: none; color: white;
            border-radius: 50%; width: 22px; height: 22px;
            font-size: 12px; padding: 0; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }

        @media (hover: hover) {
            button:hover { background: rgba(255, 255, 255, 0.08); }
            .btn-action:hover { background: rgba(148, 163, 184, 0.2); }
            .operator:hover { background: rgba(2, 132, 199, 0.25); }
            .equal:hover { background: rgba(22, 163, 74, 0.3); }
        }
    </style>
</head>
<body>

<div class="calc-card">
    <div class="header-section">
        <h2 id="calc-title">Dilshad's Calc Pro</h2>
        <img src="my_logo.png" alt="Logo" class="logo">
    </div>
    
    <div class="display-container">
        <input type="text" id="display" readonly placeholder="0">
    </div>

    <div class="buttons">
        <button class="btn-action" onclick="clearDisplay()">C</button>
        <button class="operator" onclick="appendOperator('/')">/</button>
        <button class="operator" onclick="appendOperator('*')">×</button>
        <button class="btn-action" onclick="deleteLast()">DEL</button>
        
        <button onclick="appendNumber('7')">7</button>
        <button onclick="appendNumber('8')">8</button>
        <button onclick="appendNumber('9')">9</button>
        <button class="operator" onclick="appendOperator('-')">-</button>
        
        <button onclick="appendNumber('4')">4</button>
        <button onclick="appendNumber('5')">5</button>
        <button onclick="appendNumber('6')">6</button>
        <button class="operator" onclick="appendOperator('+')">+</button>
        
        <button onclick="appendNumber('1')">1</button>
        <button onclick="appendNumber('2')">2</button>
        <button onclick="appendNumber('3')">3</button>
        <button class="equal" onclick="calculate()">=</button>
        
        <button onclick="appendNumber('0')" style="grid-column: span 2;">0</button>
        <button onclick="appendNumber('.')">.</button>
        <button class="operator" onclick="appendOperator('%')">rem</button>
    </div>
</div>

<div id="vaultOverlay" class="vault-overlay">
    <div class="vault-content">
        <div class="vault-header">
            <h3>🔒 Dilshad's Secure Vault</h3>
            <button class="close-vault-btn" onclick="closeVault()">Lock Vault</button>
        </div>
        
        <label class="file-upload-label">
            📁 Tap to Hide Image/Video
            <input type="file" id="vaultInput" accept="image/*,video/*" multiple style="display: none;" onchange="handleFileSelect(event)">
        </label>

        <div id="galleryGrid" class="gallery-grid"></div>
    </div>
</div>

<script>
    let display = document.getElementById('display');
    let calcTitle = document.getElementById('calc-title');
    let clearOnNextInput = false;

    // Vault State Trackers
    let vaultCode = localStorage.getItem('vaultCode') || null;
    let equalClickCount = 0;
    let lastCalculatedValue = "";

    // Show setup info if no code exists
    if (!vaultCode) {
        calcTitle.innerText = "Set Vault Code & Press =";
        calcTitle.style.color = "#38bdf8";
    }

    function appendNumber(value) {
        display.classList.remove('animate-pop');
        if (clearOnNextInput) {
            display.value = '';
            clearOnNextInput = false;
        }
        if (value === '.') {
            const parts = display.value.split(/[\+\-\*\/%]/);
            const currentPart = parts[parts.length - 1];
            if (currentPart.includes('.')) return;
        }
        display.value += value;
        equalClickCount = 0; // Reset tracking if a standard key is hit
    }

    function appendOperator(op) {
        display.classList.remove('animate-pop');
        if (clearOnNextInput) {clearOnNextInput = false;}
        if (display.value === '') {
            if (op === '-') display.value += op;
            return;
        }
        let lastChar = display.value.slice(-1);
        if (['+', '-', '*', '/', '%'].includes(lastChar)) {
            display.value = display.value.slice(0, -1) + op;
        } else {
            display.value += op;
        }
        equalClickCount = 0;
    }

    function clearDisplay() {
        display.classList.remove('animate-pop');
        display.value = '';
        equalClickCount = 0;
    }

    function deleteLast() {
        display.classList.remove('animate-pop');
        display.value = display.value.slice(0, -1);
        equalClickCount = 0;
    }

    function calculate() {
        if (display.value === '') return;
        
        let currentInput = display.value;
        let lastChar = currentInput.slice(-1);
        if (['+', '-', '*', '/', '%'].includes(lastChar)) {
            currentInput = currentInput.slice(0, -1);
        }

        // Setup Passcode Logic
        if (!vaultCode && !isNaN(currentInput)) {
            vaultCode = currentInput;
            localStorage.setItem('vaultCode', vaultCode);
            display.value = "Code Setted";
            clearOnNextInput = true;
            calcTitle.innerText = "Dilshad's Calc Pro";
            calcTitle.style.color = "rgba(255, 255, 255, 0.9)";
            return;
        }

        // Vault Open Detection Check (Double Equal Trigger)
        if (vaultCode && currentInput === vaultCode) {
            equalClickCount++;
            if (equalClickCount === 2) {
                openVault();
                clearDisplay();
                return;
            }
        } else {
            equalClickCount = 1;
        }

        try {
            let result = eval(currentInput);
            if (result % 1 !== 0) {
                result = parseFloat(result.toFixed(8));
            }
            
            display.value = result;
            clearOnNextInput = true;

            display.classList.remove('animate-pop');
            void display.offsetWidth; 
            display.classList.add('animate-pop');
        } catch (error) {
            display.value = "Error";
            clearOnNextInput = true;
            display.classList.add('animate-pop');
        }
    }

    /* --- VAULT UTILITIES --- */
    function openVault() {
        document.getElementById('vaultOverlay').classList.add('active');
        renderGallery();
    }

    function closeVault() {
        document.getElementById('vaultOverlay').classList.remove('active');
        equalClickCount = 0;
    }

    function handleFileSelect(event) {
        const files = event.target.files;
        let vaultItems = JSON.parse(localStorage.getItem('vaultItems')) || [];

        for (let file of files) {
            const reader = new FileReader();
            reader.onload = function(e) {
                vaultItems.push({
                    type: file.type.startsWith('video') ? 'video' : 'image',
                    data: e.target.result
                });
                localStorage.setItem('vaultItems', JSON.stringify(vaultItems));
                renderGallery();
            };
            reader.readAsDataURL(file);
        }
    }

    function renderGallery() {
        const grid = document.getElementById('galleryGrid');
        grid.innerHTML = '';
        let vaultItems = JSON.parse(localStorage.getItem('vaultItems')) || [];

        vaultItems.forEach((item, index) => {
            const container = document.createElement('div');
            container.className = 'gallery-item';

            if (item.type === 'video') {
                const video = document.createElement('video');
                video.src = item.data;
                video.controls = true;
                container.appendChild(video);
            } else {
                const img = document.createElement('img');
                img.src = item.data;
                container.appendChild(img);
            }

            const deleteBtn = document.createElement('button');
            deleteBtn.className = 'delete-item-btn';
            deleteBtn.innerHTML = '×';
            deleteBtn.onclick = () => deleteVaultItem(index);
            container.appendChild(deleteBtn);

            grid.appendChild(container);
        });
    }

    function deleteVaultItem(index) {
        let vaultItems = JSON.parse(localStorage.getItem('vaultItems')) || [];
        vaultItems.splice(index, 1);
        localStorage.setItem('vaultItems', JSON.stringify(vaultItems));
        renderGallery();
    }
</script>

</body>
</html>
