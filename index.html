<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="my_logo.png">
    <link rel="apple-touch-icon" href="my_logo.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dilshad's Calc Pro</title>
    <style>
        /* Deep Premium Gradient Background */
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            background: radial-gradient(circle at top left, #1e1b4b, #0f172a, #020617);
            overflow: hidden;
        }

        /* Glassmorphism Container Card */
        .calc-card { 
            background: rgba(30, 41, 59, 0.45); 
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 24px; 
            border-radius: 24px; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); 
            text-align: center; 
            width: 320px; 
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding: 0 5px;
        }

        .logo { 
            width: 45px; 
            height: 45px; 
            border-radius: 50%; 
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        h2 { 
            margin: 0; 
            color: rgba(255, 255, 255, 0.9); 
            font-size: 18px; 
            font-weight: 600;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        /* Glassmorphism Input Window */
        .display-container {
            background: rgba(15, 23, 42, 0.6);
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
        }

        #display { 
            width: 100%; 
            height: 50px; 
            font-size: 32px; 
            text-align: right; 
            background: transparent;
            color: #38bdf8;
            border: none;
            outline: none;
            font-family: monospace;
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.3);
        }

        /* Kept Your Exact Layout Grid */
        .buttons { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 12px; 
        }

        /* Base Glass Button with Smooth Animations */
        button { 
            padding: 18px; 
            font-size: 20px; 
            font-weight: bold;
            border: 1px solid rgba(255, 255, 255, 0.05); 
            border-radius: 14px; 
            cursor: pointer; 
            background: rgba(255, 255, 255, 0.03); 
            color: #f8fafc;
            transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1); 
            outline: none;
        }

        /* Interactive Premium Tap Glow & Animation */
        button:active { 
            transform: scale(0.93);
            background: rgba(56, 189, 248, 0.2);
            color: #fff;
            border-color: rgba(56, 189, 248, 0.5);
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.6);
            text-shadow: 0 0 8px #fff;
        }

        /* Retained Color Styles for Key Roles */
        .btn-action {
            background: rgba(148, 163, 184, 0.1);
            color: #cbd5e1;
        }
        .btn-action:active {
            background: rgba(148, 163, 184, 0.3);
            box-shadow: 0 0 20px rgba(148, 163, 184, 0.5);
            border-color: rgba(148, 163, 184, 0.6);
        }

        .operator { 
            background: rgba(2, 132, 199, 0.15); 
            color: white; 
        }
        .operator:active { 
            background: rgba(14, 165, 233, 0.35); 
            box-shadow: 0 0 25px rgba(14, 165, 233, 0.7);
            border-color: rgba(14, 165, 233, 0.8);
        }

        .equal { 
            background: rgba(22, 163, 74, 0.2); 
            color: white; 
        }
        .equal:active { 
            background: rgba(34, 197, 94, 0.4); 
            box-shadow: 0 0 25px rgba(34, 197, 94, 0.8);
            border-color: rgba(34, 197, 94, 0.9);
        }

        /* Desktop Hover Enhancements */
        @media (hover: hover) {
            button:hover { background: rgba(255, 255, 255, 0.08); }
            .btn-action:hover { background: rgba(148, 163, 184, 0.2); }
            .operator:hover { background: rgba(2, 132, 199, 0.25); }
            .equal:hover { background: rgba(22, 163, 74, 0.3); }
        }
    </style>
</head>
<body>

<div class="calc-card">
    <div class="header-section">
        <h2>Dilshad's Calc Pro</h2>
        <img src="my_logo.png" alt="Logo" class="logo">
    </div>
    
    <div class="display-container">
        <input type="text" id="display" readonly placeholder="0">
    </div>

    <div class="buttons">
        <button class="btn-action" onclick="clearDisplay()">C</button>
        <button class="operator" onclick="appendOperator('/')">/</button>
        <button class="operator" onclick="appendOperator('*')">×</button>
        <button class="btn-action" onclick="deleteLast()">DEL</button>
        
        <button onclick="appendNumber('7')">7</button>
        <button onclick="appendNumber('8')">8</button>
        <button onclick="appendNumber('9')">9</button>
        <button class="operator" onclick="appendOperator('-')">-</button>
        
        <button onclick="appendNumber('4')">4</button>
        <button onclick="appendNumber('5')">5</button>
        <button onclick="appendNumber('6')">6</button>
        <button class="operator" onclick="appendOperator('+')">+</button>
        
        <button onclick="appendNumber('1')">1</button>
        <button onclick="appendNumber('2')">2</button>
        <button onclick="appendNumber('3')">3</button>
        <button class="equal" onclick="calculate()">=</button>
        
        <button onclick="appendNumber('0')" style="grid-column: span 2;">0</button>
        <button onclick="appendNumber('.')">.</button>
        <button class="operator" onclick="appendOperator('%')">rem</button>
    </div>
</div>

<script>
    // Exact identical functional logic maintained below
    let display = document.getElementById('display');
    let clearOnNextInput = false;

    if (!display.value) {
        display.value = '';
    }

    function appendNumber(value) {
        if (clearOnNextInput) {
            display.value = '';
            clearOnNextInput = false;
        }
        if (value === '.') {
            const parts = display.value.split(/[\+\-\*\/%]/);
            const currentPart = parts[parts.length - 1];
            if (currentPart.includes('.')) return;
        }
        display.value += value;
    }

    function appendOperator(op) {
        if (clearOnNextInput) {
            clearOnNextInput = false;
        }
        
        if (display.value === '') {
            if (op === '-') display.value += op;
            return;
        }

        let lastChar = display.value.slice(-1);
        if (['+', '-', '*', '/', '%'].includes(lastChar)) {
            display.value = display.value.slice(0, -1) + op;
        } else {
            display.value += op;
        }
    }

    function clearDisplay() {
        display.value = '';
    }

    function deleteLast() {
        display.value = display.value.slice(0, -1);
    }

    function calculate() {
        if (display.value === '') return;
        
        let lastChar = display.value.slice(-1);
        if (['+', '-', '*', '/', '%'].includes(lastChar)) {
            display.value = display.value.slice(0, -1);
        }

        try {
            let result = eval(display.value);
            
            if (result % 1 !== 0) {
                result = parseFloat(result.toFixed(8));
            }
            
            display.value = result;
            clearOnNextInput = true;
        } catch (error) {
            display.value = "Error";
            clearOnNextInput = true;
        }
    }
</script>

</body>
</html>
